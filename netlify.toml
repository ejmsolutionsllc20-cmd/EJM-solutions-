[build]
  command = "pnpm --filter @workspace/ejm-keyless run build"
  publish = "artifacts/ejm-keyless/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
